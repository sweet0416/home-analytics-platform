services:
  hap-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hap-backend
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-Home Analytics Platform}
      APP_VERSION: ${HAP_RELEASE_VERSION:-1.0.0}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      DEBUG: ${DEBUG:-false}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/data/sqlite/hap.db}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_DIR: ${LOG_DIR:-/app/logs}
      BACKUP_DIR: ${BACKUP_DIR:-/app/data/sqlite/backups}
      BACKUP_AUTO_ENABLED: ${BACKUP_AUTO_ENABLED:-true}
      BACKUP_CRON: '${BACKUP_CRON:-10 3 * * *}'
      BACKUP_RETENTION_COUNT: ${BACKUP_RETENTION_COUNT:-30}
      GITHUB_BACKUP_ENABLED: ${GITHUB_BACKUP_ENABLED:-false}
      GITHUB_BACKUP_REPO: ${GITHUB_BACKUP_REPO:-}
      GITHUB_BACKUP_TOKEN: ${GITHUB_BACKUP_TOKEN:-}
      GITHUB_BACKUP_RELEASE_TAG: ${GITHUB_BACKUP_RELEASE_TAG:-hap-backups}
      GITHUB_BACKUP_ENCRYPTION_PASSPHRASE: ${GITHUB_BACKUP_ENCRYPTION_PASSPHRASE:-}
      GITHUB_BACKUP_TIMEOUT_SECONDS: ${GITHUB_BACKUP_TIMEOUT_SECONDS:-30}
      NOTIFICATION_TIMEOUT_SECONDS: ${NOTIFICATION_TIMEOUT_SECONDS:-15}
      NOTIFICATION_BARK_ENABLED: ${NOTIFICATION_BARK_ENABLED:-false}
      NOTIFICATION_BARK_SERVER_URL: ${NOTIFICATION_BARK_SERVER_URL:-https://api.day.app}
      NOTIFICATION_BARK_DEVICE_KEY: ${NOTIFICATION_BARK_DEVICE_KEY:-}
      NOTIFICATION_BARK_GROUP: ${NOTIFICATION_BARK_GROUP:-HAP}
      NOTIFICATION_BARK_SOUND: ${NOTIFICATION_BARK_SOUND:-}
      NOTIFICATION_BARK_LEVEL: ${NOTIFICATION_BARK_LEVEL:-active}
      NOTIFICATION_WECOM_ENABLED: ${NOTIFICATION_WECOM_ENABLED:-false}
      NOTIFICATION_WECOM_WEBHOOK_URL: ${NOTIFICATION_WECOM_WEBHOOK_URL:-}
      NOTIFICATION_WHATSAPP_ENABLED: ${NOTIFICATION_WHATSAPP_ENABLED:-false}
      NOTIFICATION_WHATSAPP_GRAPH_VERSION: ${NOTIFICATION_WHATSAPP_GRAPH_VERSION:-v20.0}
      NOTIFICATION_WHATSAPP_PHONE_NUMBER_ID: ${NOTIFICATION_WHATSAPP_PHONE_NUMBER_ID:-}
      NOTIFICATION_WHATSAPP_ACCESS_TOKEN: ${NOTIFICATION_WHATSAPP_ACCESS_TOKEN:-}
      NOTIFICATION_WHATSAPP_RECIPIENT_PHONE: ${NOTIFICATION_WHATSAPP_RECIPIENT_PHONE:-}
      NOTIFICATION_CUSTOM_WEBHOOK_ENABLED: ${NOTIFICATION_CUSTOM_WEBHOOK_ENABLED:-false}
      NOTIFICATION_CUSTOM_WEBHOOK_URL: ${NOTIFICATION_CUSTOM_WEBHOOK_URL:-}
      NOTIFICATION_CUSTOM_WEBHOOK_BEARER_TOKEN: ${NOTIFICATION_CUSTOM_WEBHOOK_BEARER_TOKEN:-}
      CORS_ORIGINS: '${CORS_ORIGINS:-["http://localhost:8088","http://127.0.0.1:8088"]}'
      BACKEND_WORKERS: ${BACKEND_WORKERS:-1}
      BACKEND_KEEP_ALIVE: ${BACKEND_KEEP_ALIVE:-5}
      LOTTERY_DLT_AUTO_SYNC_ENABLED: ${LOTTERY_DLT_AUTO_SYNC_ENABLED:-true}
      LOTTERY_DLT_SYNC_CRON: '${LOTTERY_DLT_SYNC_CRON:-30 22 * * *}'
      LOTTERY_DLT_SYNC_PAGE_SIZE: ${LOTTERY_DLT_SYNC_PAGE_SIZE:-100}
      LOTTERY_DLT_SYNC_TIMEOUT_SECONDS: ${LOTTERY_DLT_SYNC_TIMEOUT_SECONDS:-30}
      LOTTERY_DLT_FALLBACK_ENABLED: ${LOTTERY_DLT_FALLBACK_ENABLED:-true}
      LOTTERY_DLT_SPORTTERY_URL: ${LOTTERY_DLT_SPORTTERY_URL:-https://webapi.sporttery.cn/gateway/lottery/getHistoryPageListV1.qry}
      LOTTERY_DLT_500_HISTORY_URL: ${LOTTERY_DLT_500_HISTORY_URL:-https://datachart.500.com/dlt/history/newinc/history.php}
    volumes:
      - hap_sqlite:/app/data/sqlite
      - hap_exports:/app/data/exports
      - hap_backups:/app/data/backups
      - hap_logs:/app/logs
    networks:
      - hap_internal
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/system/health', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  hap-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hap-frontend
    restart: unless-stopped
    depends_on:
      hap-backend:
        condition: service_healthy
    ports:
      - "${HAP_WEB_PORT:-8088}:80"
    networks:
      - hap_internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  hap_internal:
    name: hap_internal

volumes:
  hap_sqlite:
    name: hap_sqlite
  hap_exports:
    name: hap_exports
  hap_backups:
    name: hap_backups
  hap_logs:
    name: hap_logs
